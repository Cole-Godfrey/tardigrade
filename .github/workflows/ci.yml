name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Type check
        run: uv run mypy src/ --strict
      - name: Test
        run: uv run pytest --tb=short -q

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Build
        run: uv build --out-dir dist --clear
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Verify wheel install
        run: |
          WHEEL=$(ls dist/tardigrade_ai-*.whl)
          WHEEL_URL="file://$PWD/$WHEEL"
          uv venv --python 3.11 .pkg-venv
          uv pip install --python .pkg-venv/bin/python "$WHEEL"
          .pkg-venv/bin/python -c "from tardigrade import armor, Workflow"
          uv venv --python 3.11 .pkg-venv-dashboard
          uv pip install --python .pkg-venv-dashboard/bin/python "tardigrade-ai[dashboard] @ $WHEEL_URL"
          .pkg-venv-dashboard/bin/python -c "from tardigrade import Dashboard"
      - name: Run demo
        run: uv run demo/demo_workflow.py

  publish:
    needs: [test, package]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/tardigrade-ai
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
